<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Kingsroad Wiki</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>⚔️ Kingsroad Wiki</h1>
    <nav>
      <button class="nav-btn active" data-page="builds">Builds</button>
      <button class="nav-btn" data-page="calculator">Calculateur</button>
    </nav>
  </header>

  <main id="app">

    <!-- Page Builds -->
    <section id="page-builds" class="page active">
      <h2>Builds de la communauté</h2>
      <div class="filter-bar">
        <button class="filter-btn active" data-class="all">Tous</button>
        <button class="filter-btn" data-class="assassin">Assassin</button>
        <button class="filter-btn" data-class="chevalier">Chevalier</button>
        <button class="filter-btn" data-class="mercenaire">Mercenaire</button>
      </div>
      <div id="builds-list"></div>
      <button id="btn-new-build">+ Créer un build</button>
    </section>

    <!-- Page Calculateur -->
    <section id="page-calculator" class="page">
      <h2>Calculateur de stats</h2>
      <div id="calculator-app"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
  <script src="js/calculator.js"></script>

</body>
</html>
